<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Interview Debrief Filer · Tobacia</title>
<meta name="robots" content="noindex,nofollow"><meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Debrief">
<link rel="icon" href="/favicon.png"><link rel="apple-touch-icon" href="/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#0a1628;color:#e5e7eb;font-family:'Segoe UI',-apple-system,sans-serif}</style>
</head><body class="min-h-screen">
<nav class="border-b border-gray-800 px-6 py-3 flex items-center justify-between">
  <a href="/me.html" class="text-sm text-gray-400 hover:text-white">&larr; Personal Apps</a>
  <span class="text-sm font-semibold text-blue-400">Interview Debrief Filer</span>
</nav>
<main class="max-w-3xl mx-auto px-4 py-6">
  <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">Interview Debrief Filer 🎤</h1>
  <p class="text-gray-400 text-sm mb-5">Voice memo or text dump after an interview → STAR-formatted brag-doc entries + competency tags + what to add next time.</p>
  <div class="bg-gray-900 border border-gray-800 rounded-lg p-5 mb-5">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-3">
      <input id="company" type="text" placeholder="Company" class="bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2">
      <input id="role" type="text" placeholder="Role" class="bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2">
      <input id="round" type="text" placeholder="Round (e.g., HM, panel)" class="bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2">
      <input id="date" type="date" class="bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2">
    </div>
    <label class="block text-xs text-gray-400 mb-2">Debrief dump (free-form, voice-friendly)
      <textarea id="dump" rows="6" placeholder="They asked about scaling. I told the BO supplier-migration story. Felt strong. Got hung up on the cost-savings number — said $13M, should have led with the AI agents instead..." class="w-full mt-1 bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2"></textarea>
    </label>
    <div class="flex gap-2"><button id="gen" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-5 rounded text-sm">File ↗</button><span id="status" class="text-xs text-gray-500 self-center"></span></div>
  </div>
  <div id="out-wrap" class="hidden bg-gray-900 border border-gray-800 rounded-lg p-5">
    <div class="flex justify-between items-center mb-3"><h2 class="text-sm font-semibold text-blue-300 uppercase tracking-widest">Brag-doc + lessons</h2><button id="copy" class="bg-blue-500 text-white py-1.5 px-4 rounded text-xs">Copy</button></div>
    <pre id="out" class="bg-gray-950 border border-gray-800 rounded p-4 text-xs text-gray-200 whitespace-pre-wrap font-mono"></pre>
  </div>
</main>
<script src="/apps/api-client.js"></script>
<script>
document.getElementById('date').valueAsDate=new Date();
const SYS=`You file post-interview debriefs into Andres's brag-doc + lesson log.

OUTPUT (markdown, this exact format):

### Interview Debrief · {Company} {Role} · {Round} · {Date}

#### Brag-doc candidates ⭐
{For each story Andres told that landed, format as STAR:}
**[Competency Tag]** · {one-line headline}
- Situation/Task: ...
- Action: ...
- Result: ...

(only include stories that genuinely landed; skip filler)

#### What to add to the brag doc
- {Specific gaps surfaced by the interview that should be backfilled in brag-doc.md}

#### Lessons for next round
- {What to lead with vs. bury, what numbers to memorize, what story to tighten}

#### Verdict on this interview
{1-2 sentences: how it likely went, what to do next}

Competency tags: [AI/Automation] [Supply Chain Strategy] [Cost Reduction] [Production Readiness] [Cross-Functional Leadership] [Crisis/Recovery] [Founder/Entrepreneurship] [Stakeholder Management] [Technical Program Management] [Supplier Negotiation]`;
document.getElementById('gen').onclick=async()=>{
  const c=document.getElementById('company').value.trim(),r=document.getElementById('role').value.trim(),rd=document.getElementById('round').value.trim(),d=document.getElementById('date').value,dump=document.getElementById('dump').value.trim();
  if(!dump){alert('Need debrief.'); return;}
  const status=document.getElementById('status'); status.textContent='Filing...';
  try{
    const out=await TobaciaAPI.call({system:SYS,prompt:`Company: ${c}\nRole: ${r}\nRound: ${rd}\nDate: ${d}\n\nDebrief:\n${dump}\n\nFile.`,maxTokens:2000});
    document.getElementById('out').textContent=out.text;
    document.getElementById('out-wrap').classList.remove('hidden');
    status.textContent=`✓ ${out.usage?.input_tokens||0}/${out.usage?.output_tokens||0}`;
  }catch(e){status.textContent=''; alert('Error: '+e.message);}
};
document.getElementById('copy').onclick=(e)=>TobaciaAPI.copyToClipboard(document.getElementById('out').textContent,e.target);
</script></body></html>
