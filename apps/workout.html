<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Workout Tracker · Tobacia</title>
<meta name="robots" content="noindex,nofollow"><meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Workout">
<link rel="icon" href="/favicon.png"><link rel="apple-touch-icon" href="/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#0a1628;color:#e5e7eb;font-family:'Segoe UI',-apple-system,sans-serif}</style>
</head><body class="min-h-screen">
<nav class="border-b border-gray-800 px-6 py-3 flex items-center justify-between">
  <a href="/me.html" class="text-sm text-gray-400 hover:text-white">&larr; Personal Apps</a>
  <span class="text-sm font-semibold text-blue-400">Workout Tracker</span>
</nav>
<main class="max-w-3xl mx-auto px-4 py-6">
  <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">Workout Tracker 💪</h1>
  <p class="text-gray-400 text-sm mb-5">Log lifts, reps, weights. Pure localStorage. Naval-fit: only your lifts, only your body.</p>

  <div class="bg-gray-900 border border-gray-800 rounded-lg p-5 mb-5">
    <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-widest mb-3">Log a set</h2>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-3">
      <input id="ex" type="text" placeholder="Exercise" class="bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2 col-span-2" list="ex-list">
      <datalist id="ex-list"><option value="Bench Press"><option value="Squat"><option value="Deadlift"><option value="Overhead Press"><option value="Pull-up"><option value="Row"><option value="Curl"><option value="Lunge"></datalist>
      <input id="reps" type="number" placeholder="Reps" class="bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2">
      <input id="weight" type="number" placeholder="Weight (lb)" class="bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2">
    </div>
    <div class="flex gap-2">
      <button id="log" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded text-sm">Log Set</button>
      <button id="export" class="bg-gray-800 hover:bg-gray-700 text-gray-300 py-2 px-3 rounded text-xs">Export JSON</button>
      <button id="clear" class="bg-gray-800 hover:bg-red-700 text-gray-400 py-2 px-3 rounded text-xs">Clear All</button>
    </div>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-5">
    <div class="bg-gray-900 border border-gray-800 rounded p-3 text-center"><div class="text-xs text-gray-500 uppercase">Today's Sets</div><div id="today" class="text-xl font-bold text-blue-300">0</div></div>
    <div class="bg-gray-900 border border-gray-800 rounded p-3 text-center"><div class="text-xs text-gray-500 uppercase">Today's Volume</div><div id="vol" class="text-xl font-bold text-green-400">0 lb</div></div>
    <div class="bg-gray-900 border border-gray-800 rounded p-3 text-center"><div class="text-xs text-gray-500 uppercase">7-Day Streak</div><div id="streak" class="text-xl font-bold text-yellow-400">0</div></div>
  </div>

  <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-2">Recent</h2>
  <div id="log-list" class="space-y-1 mb-6"></div>
</main>

<script>
const KEY='tobacia_workout';
const load=()=>JSON.parse(localStorage.getItem(KEY)||'[]');
const save=(s)=>localStorage.setItem(KEY,JSON.stringify(s));
const todayStr=()=>new Date().toISOString().slice(0,10);

function render(){
  const sets=load();
  const tToday=sets.filter(s=>s.date===todayStr());
  document.getElementById('today').textContent=tToday.length;
  document.getElementById('vol').textContent=tToday.reduce((a,s)=>a+s.reps*s.weight,0).toLocaleString()+' lb';
  // streak
  const dates=new Set(sets.map(s=>s.date));
  let streak=0; for(let i=0;i<7;i++){const d=new Date(); d.setDate(d.getDate()-i); if(dates.has(d.toISOString().slice(0,10))) streak++; else break;}
  document.getElementById('streak').textContent=streak;
  // recent
  const list=document.getElementById('log-list');
  list.innerHTML='';
  sets.slice(-15).reverse().forEach((s,i)=>{
    const idx=sets.length-1-i;
    const div=document.createElement('div');
    div.className='bg-gray-900 border border-gray-800 rounded px-3 py-2 flex justify-between items-center text-sm';
    div.innerHTML=`<span><span class="text-gray-500 text-xs">${s.date}</span> · <strong>${s.exercise}</strong> · ${s.reps}×${s.weight}lb</span>
    <button class="del text-xs text-gray-500 hover:text-red-400" data-i="${idx}">×</button>`;
    list.appendChild(div);
  });
  list.querySelectorAll('.del').forEach(b=>b.onclick=()=>{const s=load(); s.splice(+b.dataset.i,1); save(s); render();});
}
document.getElementById('log').onclick=()=>{
  const ex=document.getElementById('ex').value.trim();
  const reps=+document.getElementById('reps').value;
  const weight=+document.getElementById('weight').value;
  if(!ex||!reps){alert('Need exercise + reps.'); return;}
  const sets=load();
  sets.push({date:todayStr(),exercise:ex,reps,weight:weight||0,t:Date.now()});
  save(sets);
  document.getElementById('reps').value='';
  document.getElementById('weight').value='';
  render();
};
document.getElementById('export').onclick=()=>{
  const blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`workout-${todayStr()}.json`;a.click();
};
document.getElementById('clear').onclick=()=>{if(confirm('Clear all sets?')){save([]); render();}};
render();
</script></body></html>
