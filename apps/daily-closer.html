<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Daily Closer · Tobacia</title>
<meta name="robots" content="noindex,nofollow"><meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="Closer">
<link rel="icon" href="/favicon.png"><link rel="apple-touch-icon" href="/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<style>body{background:#0a1628;color:#e5e7eb;font-family:'Segoe UI',-apple-system,sans-serif}</style>
</head><body class="min-h-screen">
<nav class="border-b border-gray-800 px-6 py-3 flex items-center justify-between">
  <a href="/me.html" class="text-sm text-gray-400 hover:text-white">&larr; Personal Apps</a>
  <span class="text-sm font-semibold text-blue-400">Daily Closer</span>
</nav>
<main class="max-w-3xl mx-auto px-4 py-6">
  <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2">Daily Closer 🌙</h1>
  <p class="text-gray-400 text-sm mb-5">9 PM debrief. Three sliders, three text fields. Output: tomorrow's draft plan + wellbeing pulse + brag-doc candidates.</p>

  <div class="bg-gray-900 border border-gray-800 rounded-lg p-5 mb-5">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
      <label class="block text-xs text-gray-400">Energy 1-10
        <input id="energy" type="range" min="1" max="10" value="6" oninput="document.getElementById('eVal').textContent=this.value" class="w-full mt-1">
        <span id="eVal" class="text-blue-300">6</span>
      </label>
      <label class="block text-xs text-gray-400">Focus 1-10
        <input id="focus" type="range" min="1" max="10" value="6" oninput="document.getElementById('fVal').textContent=this.value" class="w-full mt-1">
        <span id="fVal" class="text-blue-300">6</span>
      </label>
      <label class="block text-xs text-gray-400">Spirit 1-10
        <input id="spirit" type="range" min="1" max="10" value="6" oninput="document.getElementById('sVal').textContent=this.value" class="w-full mt-1">
        <span id="sVal" class="text-blue-300">6</span>
      </label>
    </div>
    <label class="block text-xs text-gray-400 mb-2">Today's wins
      <textarea id="wins" rows="3" class="w-full mt-1 bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2"></textarea>
    </label>
    <label class="block text-xs text-gray-400 mb-2">Today's struggles
      <textarea id="struggles" rows="3" class="w-full mt-1 bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2"></textarea>
    </label>
    <label class="block text-xs text-gray-400 mb-2">Tomorrow's intent
      <textarea id="intent" rows="2" class="w-full mt-1 bg-gray-950 border border-gray-700 text-gray-100 text-sm rounded px-3 py-2"></textarea>
    </label>
    <div class="flex gap-2"><button id="gen" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-5 rounded text-sm">Close out day ↗</button><span id="status" class="text-xs text-gray-500 self-center"></span></div>
  </div>

  <div id="out-wrap" class="hidden bg-gray-900 border border-gray-800 rounded-lg p-5">
    <div class="flex justify-between items-center mb-3"><h2 class="text-sm font-semibold text-blue-300 uppercase tracking-widest">Closer output</h2><button id="copy" class="bg-blue-500 text-white py-1.5 px-4 rounded text-xs">Copy</button></div>
    <pre id="out" class="bg-gray-950 border border-gray-800 rounded p-4 text-xs text-gray-200 whitespace-pre-wrap font-mono"></pre>
  </div>
</main>

<script src="/apps/api-client.js"></script>
<script>
const SYS=`You close Andres's day. Format:

# Daily Closer · ${new Date().toISOString().slice(0,10)}

## Pulse
- Energy: X/10 · Focus: X/10 · Spirit: X/10
- {1-2 sentences on the pulse — pattern, intervention if needed}

## Today's wins (raw)
- ...

## Brag-Doc candidates ⭐
{From the wins, surface 1-3 that are STAR-worthy and tag them. If none qualify, say so.}

## Struggles & lessons
- ...

## Tomorrow's draft plan (3 priorities)
1. ...

## Spiritual check (if Spirit < 6)
- {1 line of Christ-centered redirect — verse, prayer, or practice}

Be honest. If energy is low, recommend rest. If focus broken, name the leak.`;

document.getElementById('gen').onclick=async()=>{
  const e=+document.getElementById('energy').value,f=+document.getElementById('focus').value,s=+document.getElementById('spirit').value;
  const w=document.getElementById('wins').value.trim(),st=document.getElementById('struggles').value.trim(),i=document.getElementById('intent').value.trim();
  if(!w&&!st){alert('Need wins or struggles.'); return;}
  const status=document.getElementById('status'); status.textContent='Closing... (Sonnet 4.6)';
  try{
    const r=await TobaciaAPI.call({system:SYS,prompt:`Pulse: E${e} F${f} S${s}.\n\nWins:\n${w}\n\nStruggles:\n${st}\n\nTomorrow intent:\n${i}\n\nClose out the day.`,maxTokens:1800});
    document.getElementById('out').textContent=r.text;
    document.getElementById('out-wrap').classList.remove('hidden');
    status.textContent=`✓ ${r.usage?.input_tokens||0}/${r.usage?.output_tokens||0}`;
  }catch(err){status.textContent=''; alert('Error: '+err.message);}
};
document.getElementById('copy').onclick=(e)=>TobaciaAPI.copyToClipboard(document.getElementById('out').textContent,e.target);
</script></body></html>
